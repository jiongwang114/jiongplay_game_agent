# =============================================================================
#  Steam 游戏推荐 Agent — Docker Compose 云服务器部署
# =============================================================================
#  首次部署:
#      cp .env.example .env && nano .env    # 填入 API Key
#      docker compose up -d --build
#
#  常用命令:
#      docker compose logs -f               # 实时日志
#      docker compose restart               # 重启
#      docker compose down                  # 停止
#      docker compose up -d --build         # 更新代码并重建
#      docker compose exec game-agent /bin/bash  # 进入容器调试
# =============================================================================

services:
  game-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steam-game-agent
    ports:
      - "${PORT:-80}:8000"    # 外部端口通过环境变量 PORT 控制，默认 80
    env_file:
      - .env                  # API Key 等敏感配置，不提交到 Git
    environment:
      - DB_PATH=/app/data/sqlite/games.db
      - VECTOR_PATH=/app/data/vector_index
    volumes:
      # 持久化数据：即使容器被删除，游戏数据库、向量索引、用户数据不会丢失
      - game_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 限制资源（可选，按需取消注释）
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G
    #       cpus: '2'

volumes:
  game_data:
    name: steam-game-agent-data
